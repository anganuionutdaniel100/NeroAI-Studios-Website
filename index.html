<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeroAI Studios - Hub Inovare AI</title>
  <meta name="description" content="Alătură-te comunității Discord NeroAI Studios pentru instrumente AI de ultimă generație, resurse și colaborare creativă.">
  <meta name="theme-color" content="#a855f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NeroAI">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-gray-950 text-slate-100">
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Main Content -->
  <main>
    <!-- Hero Section -->
    <div id="hero"></div>

    <!-- Stats Section -->
    <div id="stats"></div>

    <!-- Features Section -->
    <div id="features"></div>

    <!-- Discord Integration Section -->
    <div id="discord"></div>

    <!-- Info Panel Section -->
    <div id="info"></div>

    <!-- News & Updates Section -->
    <div id="news"></div>

    <!-- Forum Section -->
    <div id="forum"></div>

    <!-- Tickets Section -->
    <div id="tickets"></div>

    <!-- Quests Section -->
    <div id="quests"></div>

    <!-- Staff Applications Section -->
    <div id="staff-apps"></div>

    <!-- Radio 24/7 Section -->
    <div id="radio"></div>

    <!-- Complaints Section -->
    <div id="complaints"></div>

    <!-- Chatbox Section -->
    <div id="chatbox"></div>

    <!-- Join Section -->
    <div id="join"></div>
  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Install Banner Container -->
  <div id="install-banner"></div>

  <!-- Radio Player Bar -->
  <div id="radio-player-bar"></div>

  <!-- GitHub Pages compatibility shim (active only when miniappsAI SDK is absent) -->
  <script src="github-shim.js"></script>

  <script src="main.js" type="module"></script>
</body>
</html>
